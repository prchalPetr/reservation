<div class="buttons-box-layout">
  <p-card>
    <span>Possible times for current date:</span>
    <div [class]="buttons() ? 'buttons-container' : 'buttons-container-empty'">
      @if (buttons()) {
        <p-selectbutton
          [options]="buttons()"
          [formControl]="control()"
          optionLabel="label"
          optionValue="label"
        />
      } @else {
        <div class="empty-state">
          @if (emptyIcon()) {
            <span [class]="emptyIcon()" class="empty-icon"></span>
          }
          <span>{{ emptyMessage() }}</span>
        </div>
      }
    </div>
  </p-card>
</div>
