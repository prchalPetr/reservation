<div class="popover-container">
  <p-button
    type="button"
    [label]="selectedOption ? selectedOption.label : label()"
    (onClick)="toggle($event, op)"
    styleClass="min-w-48"
  />
  <p-popover #op>
    <span>{{ optionsHeader() }}</span>
    <div class="popover-body">
      

      @for (item of options(); track $index) {

      <button pButton (click)="select(item, op)">
        <span>{{ item.label }}</span>
      </button>

      }
    </div>
  </p-popover>
</div>
